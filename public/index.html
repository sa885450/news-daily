<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能儀表板 - v13.5.4 (智捷戰報)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark {
            background-color: #0f172a;
            color: #f8fafc;
        }

        .news-card.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
        }

        .dark ::-webkit-scrollbar {
            width: 8px;
        }

        .dark ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
            border-radius: 4px;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        /* 🟢 v8.4.0: Market Ticker Animations */
        @keyframes scroll {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .ticker-wrapper {
            display: flex;
            width: max-content;
            animation: scroll 60s linear infinite;
        }

        .ticker-wrapper:hover {
            animation-play-state: paused;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 transition-colors duration-300">
    <!-- 🟢 v8.4.0: Market Ticker (走馬燈) -->
    <div id="market-ticker"
        class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 overflow-hidden py-2 sticky top-0 z-[100] backdrop-blur-md bg-opacity-80 hidden">
        <div class="ticker-wrapper" id="ticker-content">
            <!-- Ticker items will be injected here -->
        </div>
    </div>

    <!-- Header -->
    <header class="bg-indigo-600 dark:bg-indigo-900 text-white p-6 shadow-lg">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-white/20 rounded-2xl backdrop-blur-md">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-3xl font-black tracking-tighter">AI 智捷戰報 <span
                            class="text-xs font-normal opacity-60">v13.5.9</span></h1>
                    <p class="text-indigo-100/70 text-sm font-medium" id="report-date">正在載入戰情數據...</p>
                </div>
            </div>
            <div class="flex items-center gap-3" id="ai-entities">
                <!-- AI entities will be injected here -->
            </div>
            <button onclick="toggleTheme()"
                class="p-2 bg-white/10 hover:bg-white/20 rounded-xl transition-all border border-white/20">
                <svg id="theme-icon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path class="sun" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 3v1m0 16v1m9-9h1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.071 16.071l.707.707M7.757 7.757l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z">
                    </path>
                </svg>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-8 space-y-8">
        <!-- 核心統計區 (Dashboard Stats) -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 今日 AI 戰術報告 (Summary Card) -->
            <div
                class="lg:col-span-2 bg-white dark:bg-slate-800 rounded-[2.5rem] p-8 shadow-xl border border-slate-100 dark:border-slate-700">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-indigo-100 dark:bg-indigo-900/30 rounded-xl text-indigo-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-black text-slate-800 dark:text-slate-100">今日 AI 戰術回報</h2>
                    <span id="sentiment-badge"
                        class="ml-auto px-4 py-1 rounded-full text-xs font-black uppercase tracking-wider">Loading</span>
                </div>
                <div id="summary-content"
                    class="prose dark:prose-invert max-w-none text-slate-600 dark:text-slate-300 leading-relaxed space-y-4">
                    <!-- AI Summary injected here -->
                    <div class="animate-pulse space-y-3">
                        <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-3/4"></div>
                        <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded"></div>
                        <div class="h-4 bg-slate-200 dark:bg-slate-700 rounded w-5/6"></div>
                    </div>
                </div>

                <!-- 🟢 v13.5.0: Tactical Advice Section -->
                <div id="tactical-advice-box"
                    class="mt-8 p-6 bg-slate-50 dark:bg-slate-900/50 rounded-3xl border border-dashed border-slate-200 dark:border-slate-700 hidden">
                    <!-- Tactical advice injected here -->
                </div>
            </div>

            <!-- 分析圖表區 (Charts Column) -->
            <div class="space-y-6">
                <!-- 走勢圖 -->
                <div
                    class="bg-white dark:bg-slate-800 rounded-[2.5rem] p-6 shadow-xl border border-slate-100 dark:border-slate-700 h-64">
                    <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest">情緒走勢 (Sentiment)</h3>
                    <canvas id="sentimentChart"></canvas>
                </div>
                <!-- 雷達圖 -->
                <div
                    class="bg-white dark:bg-slate-800 rounded-[2.5rem] p-6 shadow-xl border border-slate-100 dark:border-slate-700 h-64">
                    <h3 class="text-sm font-bold text-slate-400 mb-2 uppercase tracking-widest">五力分析 (Radar)</h3>
                    <canvas id="radarChart"></canvas>
                </div>
                <!-- 板塊圖 -->
                <div
                    class="bg-white dark:bg-slate-800 rounded-[2.5rem] p-6 shadow-xl border border-slate-100 dark:border-slate-700 h-64">
                    <h3 class="text-sm font-bold text-slate-400 mb-2 uppercase tracking-widest">板塊情緒 (Sectors)</h3>
                    <canvas id="sectorChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 熱詞雲與勢力圖 (Interactive Row) -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- 勢力圖 (Knowledge Graph) -->
            <div
                class="bg-white dark:bg-slate-800 rounded-[2.5rem] p-8 shadow-xl border border-slate-100 dark:border-slate-700">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-emerald-100 dark:bg-emerald-900/30 rounded-xl text-emerald-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-black text-slate-800 dark:text-slate-100">市場勢力圖</h2>
                </div>
                <div id="vis-network"
                    class="w-full h-[400px] bg-slate-50 dark:bg-slate-900/50 rounded-3xl overflow-hidden"></div>
            </div>

            <!-- 熱詞雲 (Word Cloud) -->
            <div
                class="bg-white dark:bg-slate-800 rounded-[2.5rem] p-8 shadow-xl border border-slate-100 dark:border-slate-700">
                <div class="flex items-center gap-3 mb-6">
                    <div class="p-2 bg-orange-100 dark:bg-orange-900/30 rounded-xl text-orange-600">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M17.657 18.657A8 8 0 016.343 7.343S7 9 9 10c0-2 .5-5 2.986-7C14 5 16.09 5.777 17.656 7.343A7.975 7.975 0 0120 13a7.975 7.975 0 01-2.343 5.657z">
                            </path>
                        </svg>
                    </div>
                    <h2 class="text-2xl font-black text-slate-800 dark:text-slate-100">市場情緒熱評</h2>
                </div>
                <div id="keyword-cloud-container" class="w-full h-[400px] relative">
                    <canvas id="keyword-cloud" class="w-full h-full"></canvas>
                </div>
            </div>
        </div>

        <!-- 導航與篩選 (News Feed Toolbar) -->
        <div class="sticky top-20 z-50 py-4">
            <div
                class="bg-white/80 dark:bg-slate-800/80 backdrop-blur-xl rounded-[2rem] p-2 shadow-lg border border-white dark:border-slate-700 flex flex-wrap items-center gap-2 overflow-x-auto no-scrollbar">
                <button onclick="setCategory('全部')" data-cat="全部"
                    class="cat-btn px-6 py-3 rounded-2xl text-sm font-bold transition-all bg-indigo-600 text-white shadow-md active-cat">全部消息</button>
                <div class="h-6 w-px bg-slate-200 dark:bg-slate-700 mx-2"></div>
                <div id="category-btns" class="flex gap-2">
                    <!-- Dynamic categories -->
                </div>
                <div class="ml-auto relative flex items-center">
                    <div class="absolute left-4 text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="搜尋報導或實體..."
                        class="pl-12 pr-6 py-3 bg-slate-100 dark:bg-slate-900 rounded-2xl text-sm border-none focus:ring-2 focus:ring-indigo-500 w-64 transition-all">
                </div>
            </div>
        </div>

        <!-- 新聞列表 (News Grid) -->
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
            <!-- News cards will be injected here -->
        </div>

        <!-- 分頁加載 (Lazy Load) -->
        <div id="load-more-trigger" class="py-12 flex justify-center">
            <button onclick="renderNewsPage(true)"
                class="px-8 py-3 bg-white dark:bg-slate-800 rounded-2xl shadow-md text-slate-500 font-bold hover:text-indigo-600 transition-all border border-slate-100 dark:border-slate-700">
                加載更多報導
            </button>
        </div>
    </main>

    <!-- 🟢 v7.1.0: TradingView Widget (Modal) -->
    <div id="chartModal"
        class="fixed inset-0 bg-black/80 z-[120] hidden flex items-center justify-center backdrop-blur-md opacity-0 transition-all duration-300">
        <div
            class="bg-white dark:bg-slate-900 rounded-[2rem] shadow-2xl w-full max-w-5xl h-[80vh] mx-4 overflow-hidden transform scale-95 transition-all duration-300 flex flex-col">
            <div class="p-6 flex justify-between items-center border-b border-slate-100 dark:border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-indigo-500 rounded-lg text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z">
                            </path>
                        </svg>
                    </div>
                    <div>
                        <h3 class="text-xl font-black text-slate-800 dark:text-slate-100" id="chartModalTitle">即時盤勢分析
                        </h3>
                        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest"
                            id="chartModalSubtitle">Symbol: --</p>
                    </div>
                </div>
                <button onclick="closeChartModal()"
                    class="p-2 bg-slate-100 dark:bg-slate-800 rounded-full text-slate-400 hover:bg-red-100 hover:text-red-500 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div id="tradingview-container" class="flex-grow w-full bg-slate-50 dark:bg-black">
                <!-- TradingView Widget will be injected here -->
            </div>
        </div>
    </div>

    <!-- 🟢 v7.1.0: TradingView Widget Core -->
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script src="js/chart-widget.js"></script>
    <script src="js/app.js"></script>
    <script>
        // 初始化
        window.onload = init;
    </script>
</body>

</html>
