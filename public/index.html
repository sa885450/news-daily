<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能儀表板 - v6.0.0 (CSR)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/wordcloud2.js/1.2.2/wordcloud2.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        .dark {
            background-color: #0f172a;
            color: #f8fafc;
        }

        .news-card.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
        }

        .dark ::-webkit-scrollbar {
            width: 8px;
        }

        .dark ::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }
    </style>
</head>

<body class="bg-[#f8fafc] dark:bg-slate-900 text-slate-900 dark:text-slate-100 min-h-screen pb-20">
    <!-- 🟢 v6.0.0 (CSR): 靜態外殼 -->
    <div class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3">
        <button onclick="toggleDarkMode()"
            class="p-4 bg-white dark:bg-slate-800 rounded-full shadow-2xl border border-slate-200 dark:border-slate-700 text-indigo-600 dark:text-indigo-400 hover:scale-110 transition-transform">
            <svg class="w-6 h-6 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
            <svg class="w-6 h-6 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
        </button>
    </div>

    <div class="max-w-6xl mx-auto px-4 pt-10 relative">
        <header class="text-center mb-10">
            <div
                class="inline-block px-4 py-1.5 bg-indigo-600 text-white text-xs font-bold rounded-full mb-4 tracking-widest uppercase shadow-lg shadow-indigo-200">
                AI Insight Report v6.0.0 (CSR)</div>
            <h1 class="text-4xl md:text-5xl font-black text-slate-900 dark:text-white mb-3 tracking-tight">智能新聞儀表板</h1>
            <p id="report-date" class="text-slate-500 font-medium text-lg">載入中...</p>
            <div id="ai-entities" class="mt-4 flex flex-wrap justify-center gap-2 animate-fade">
                <!-- 由 app.js 動態填充 -->
            </div>
        </header>

        <section class="mb-10 grid grid-cols-1 md:grid-cols-3 gap-6 animate-fade">
            <div
                class="md:col-span-2 bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-md border border-slate-100 dark:border-slate-700">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-bold text-slate-700 dark:text-slate-200 flex items-center"><span
                            class="mr-2">📈</span>
                        市場情緒走勢</h3>
                    <div
                        class="text-xs font-bold px-2 py-1 rounded bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400">
                        今日: <span id="today-sentiment-value" class="text-base">--</span>
                    </div>
                </div>
                <div class="h-64 w-full"><canvas id="sentimentChart"></canvas></div>
            </div>
            <div
                class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-md border border-slate-100 dark:border-slate-700 flex flex-col">
                <h3 class="text-lg font-bold text-slate-700 dark:text-slate-200 mb-4 flex items-center"><span
                        class="mr-2">🧭</span>
                    五力分析</h3>
                <div class="flex-grow relative"><canvas id="radarChart"></canvas></div>
            </div>
            <div
                class="md:col-span-3 bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-md border border-slate-100 dark:border-slate-700">
                <h3 class="text-lg font-bold text-slate-700 dark:text-slate-200 mb-4 flex items-center"><span
                        class="mr-2">📊</span>
                    板塊情緒分布 (Sector Sentiment)</h3>
                <div class="h-48 w-full"><canvas id="sectorChart"></canvas></div>
            </div>
        </section>

        <div class="sticky top-4 z-50 mb-10">
            <div
                class="flex flex-col md:flex-row items-center justify-center gap-4 bg-white/80 dark:bg-slate-800/80 backdrop-blur-md p-3 rounded-2xl shadow-lg border border-white/50 dark:border-slate-700 w-fit mx-auto">
                <div id="category-filters" class="flex flex-wrap gap-2 justify-center">
                    <!-- 由 app.js 動態填充 -->
                </div>
                <div class="relative w-full md:w-48 transition-all focus-within:w-64">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 20 20">
                            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="m19 19-4-4m0-7A7 7 0 1 1 1 8a7 7 0 0 1 14 0Z" />
                        </svg>
                    </div>
                    <input type="text" id="search-input" oninput="searchNews(this.value)"
                        class="block w-full p-2 pl-10 text-sm text-slate-900 dark:text-white border border-slate-200 dark:border-slate-700 rounded-full bg-slate-50 dark:bg-slate-900 focus:ring-indigo-500 focus:border-indigo-500 focus:bg-white dark:focus:bg-slate-800 transition-all shadow-inner"
                        placeholder="搜尋新聞...">
                </div>
            </div>
        </div>

        <section class="mb-12 animate-fade">
            <div
                class="bg-white dark:bg-slate-800 rounded-[2rem] p-8 md:p-10 shadow-xl border border-indigo-50 dark:border-slate-700 relative overflow-hidden">
                <button onclick="toggleSpeech()" id="ttsBtn"
                    class="absolute top-6 right-6 p-2 rounded-full bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 hover:bg-indigo-100 transition-colors z-20"
                    title="朗讀摘要">
                    <svg id="ttsIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z">
                        </path>
                    </svg>
                </button>
                <div class="relative z-10 prose prose-indigo dark:prose-invert max-w-none text-slate-600 dark:text-slate-300 leading-relaxed text-lg"
                    id="summary-content">
                    AI 摘要載入中...
                </div>
            </div>
        </section>

        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 pb-6 animate-fade"
            style="animation-delay: 0.1s;">
            <!-- 由 app.js 分頁呈現 -->
        </div>

        <div id="load-more-container" class="flex justify-center pb-12 animate-fade hidden">
            <button onclick="loadMoreNews()"
                class="px-8 py-3 bg-white dark:bg-slate-800 border-2 border-indigo-100 dark:border-slate-700 text-indigo-600 dark:text-indigo-400 font-black rounded-2xl hover:bg-indigo-50 dark:hover:bg-slate-700 transition-all shadow-lg active:scale-95">
                載入更多新聞 ...
            </button>
        </div>

        <section id="buzzword-section" class="mb-12 animate-fade hidden" style="animation-delay: 0.3s;">
            <h3 class="text-xl font-black text-slate-800 dark:text-white mb-4 flex items-center"><span
                    class="text-2xl mr-2">📅</span> 7日市場熱詞 (Buzzword Cloud)</h3>
            <div
                class="bg-white dark:bg-slate-800 rounded-2xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col items-center">
                <canvas id="wordCloudCanvas" class="w-full max-w-4xl h-[350px] cursor-pointer"></canvas>
                <div
                    class="mt-4 flex flex-wrap gap-2 justify-center opacity-60 text-xs font-bold text-slate-400 dark:text-slate-500">
                    💡 點擊熱詞查看趨勢或搜尋新聞
                </div>
            </div>
        </section>

        <footer
            class="mt-10 pt-8 border-t border-slate-200 dark:border-slate-800 text-center text-slate-400 dark:text-slate-500 text-sm font-medium">
            自動化生成系統 · Powered by Gemini 2.5 & CSR Engine (v6.0.0)
        </footer>
    </div>

    <!-- Modals (Same as before but with ID targets) -->
    <div id="contentModal"
        class="fixed inset-0 bg-black/60 z-[110] hidden flex items-center justify-center backdrop-blur-md opacity-0 transition-all duration-300">
        <div
            class="bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl w-full max-w-2xl mx-4 overflow-hidden transform scale-95 transition-all duration-300">
            <div class="p-8 pb-4 flex justify-between items-start">
                <div>
                    <div id="modalSource" class="text-[10px] font-black text-indigo-500 uppercase tracking-widest mb-2">
                        新聞來源</div>
                    <h3 class="text-2xl font-black text-slate-800 dark:text-slate-100 leading-tight" id="modalTitle">
                        標題載入中...</h3>
                </div>
                <button onclick="closeContentModal()"
                    class="p-2 bg-slate-100 dark:bg-slate-700 rounded-full text-slate-400 hover:bg-red-100 hover:text-red-500 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="px-8 py-4 max-h-[60vh] overflow-y-auto text-slate-600 dark:text-slate-300 leading-relaxed text-lg"
                id="modalText">內容載入中...</div>
            <div
                class="p-8 pt-4 bg-slate-50 dark:bg-slate-900/50 border-t border-slate-100 dark:border-slate-700 flex justify-end">
                <a id="modalFullLink" href="#" target="_blank"
                    class="px-6 py-2.5 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-200">閱讀全文</a>
            </div>
        </div>
    </div>

    <!-- Keyword Articles Modal -->
    <div id="keywordArticlesModal"
        class="fixed inset-0 bg-black/60 z-[105] hidden flex items-center justify-center backdrop-blur-md opacity-0 transition-all duration-300">
        <div
            class="bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl w-full max-w-xl mx-4 overflow-hidden transform scale-95 transition-all duration-300">
            <div class="p-8 pb-4 flex justify-between items-center border-b border-slate-50 dark:border-slate-700">
                <h3 class="text-xl font-black text-slate-800 dark:text-slate-100" id="kwModalTitle">相關新聞列表</h3>
                <button onclick="closeKeywordModal()"
                    class="p-2 bg-slate-100 dark:bg-slate-700 rounded-full text-slate-400 hover:bg-red-100 hover:text-red-500 transition-all">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12">
                        </path>
                    </svg>
                </button>
            </div>
            <div class="p-4 max-h-[50vh] overflow-y-auto" id="kwModalList"></div>
            <div class="p-6 bg-slate-50 dark:bg-slate-900/50 text-center text-xs text-slate-400 font-bold">💡
                點擊標題即可顯示預覽內容</div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>

</html>
